<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Fibonacci sequence</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-form-field appearance="outline" class="n-field">
      <mat-label>Number of terms (1–{{ maxN }})</mat-label>
      <input matInput type="number" step="1" [formField]="settingsForm.n" />
    </mat-form-field>
    @if (sequence().capped) {
      <p class="note">The value was clamped to the range 1–50.</p>
    }
    <p class="seq">
      @for (t of sequence().terms; track $index) {
        <span class="term">{{ t }}</span>
        @if ($index < sequence().terms.length - 1) {
          <span class="sep">,</span>
        }
      }
    </p>
  </mat-card-content>
</mat-card>
