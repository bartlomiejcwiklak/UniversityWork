<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        * {
            margin: 0;
            padding: 0;
        }
        
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes gradient-animation {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
        }

        #bg {
            width: 100%;
            height: 100%;
            background: linear-gradient(300deg,deepskyblue,darkviolet,blue);
            background-size: 180% 180%;
            animation: fadeIn ease 3s;
            animation: gradient-animation 10s ease infinite;
        }

        body {
            color: white;

        }

        #header {
            margin: auto;
            height: 100px;
            text-align: center;
            font-family: Poppins, sans-serif;
            padding-top: 45px;
        }

        #header h1 {
            font-size: 80px;
        }

        #body, #body2 {
            margin: auto;
            width: fit-content;
            text-align: center;
            font-family: Poppins, sans-serif;
            padding-top: 45px;
        }

        #body2 {
            height: 700px;
        }

        #inputting {
            text-align: left;
            float: left;
            margin: 20px;
        }

        #inputting h4 {
            padding-bottom: 5px;
        }

        #inputting input {
            padding: 5px;
            border: 1px black solid;
            border-radius: 3px;
            width: 225px;
            height: 20px;
            padding-left: 10px;
            font-family: Poppins, sans-serif;;
        }

        #inputting input:hover {
            background-color: rgb(221, 221, 221);
        }

        #submit {
            margin-top: 20px;
            width: 150px;
            height: 40px;
            font-family: Poppins, sans-serif;;
        }

        #submit:hover {
            cursor: pointer;
        }
        
        #check{
            margin-right: 3px;
        }
    </style>
</head>
<body>
    <div id="bg"><form action="https://google.com">
        <div id="header">
            <h1>Registration</h1>
        </div>
        <div id="body">
            <div id="inputting">
                <h4>Name</h4>
                <input type="text" name="name" id="" placeholder="John">
            </div>
            <div id="inputting">
                <h4>Surname</h4>
                <input type="text" name="surname" id="" placeholder="Doe">
            </div>
        </div>
        <div id="body">
            <div id="inputting">
                <h4>Email</h4>
                <input type="email" name="email" id="" placeholder="john@doe.com">
            </div>
            <div id="inputting">
                <h4>Phone Number</h4>
                <input type="tel" name="phone" id="" placeholder="000-000-000" pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}">
            </div>
        </div>
        <div id="body2">
            <input type="checkbox" name="agreement" id="check"><label for="agreement">I agree for my data to get processed by LUT.</label><br>
            <input type="submit" id="submit">
            <input type="reset" id="submit">
        </div>
        </form></div>
</body>
</html>
